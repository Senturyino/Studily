        <div>Welcome, Emmanuel</div>

      <section class="content">
        <h2>📘 Classwork & Homework Tracker</h2>

        <!-- Filters -->
        <div class="filter-container">
  <label for="yearFilter">Academic Year:</label>
  <select id="yearFilter">
    <option disabled selected>Select year</option>
    
  </select>

  <label for="monthFilter">Month:</label>
  <select id="monthFilter">
    <option disabled selected>Select a month</option>
    <option value="january">January</option>
    <option value="february">February</option>
    <option value="march">March</option>
    <option value="april">April</option>
    <option value="may">May</option>
    <option value="june">June</option>
    <option value="july">July</option>
    <option value="august">August</option>
    <option value="september">September</option>
    <option value="october">October</option>
    <option value="november">November</option>
    <option value="december">December</option>
  </select>

  <label for="subjectFilter">Subject:</label>
  <select id="subjectFilter">
    <option disabled selected>Select subject</option>
    <!-- dynamically populated when backend is ready -->
  </select>
</div>

        <!-- Classwork Section -->
        <div class="cw-hw-section">
          <h3>📗 Classwork</h3>
          <div id="classworkDisplay" class="cw-hw-weeks"></div>
        </div>

        <!-- Homework Section -->
        <div class="cw-hw-section">
          <h3>📙 Homework</h3>
          <div id="homeworkDisplay" class="cw-hw-weeks"></div>
