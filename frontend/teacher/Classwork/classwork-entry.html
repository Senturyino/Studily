<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classwork Entry - Studily</title>
  <link rel="stylesheet" href="../../Student Dashboard UI/dashboard.css" />
  <link rel="stylesheet" href="classwork-entry.css" />
 
</head>
<body>

  <div class="dashboard-container">
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">STUDILY</div>
      <nav>
        <ul>
        <li><a href="../teacher-dashboard.html" class="active">Dashboard</a></li>
          <li><a href="classwork-entry.html">Classwork & Homework Entry</a></li>
          <li><a href="../teacher attendance/attendance.html">Attendance Management</a></li>
          <li><a href="../login.html" class="logout" id="logoutBtn">Logout</a></li>
      </ul>
      </nav>
    </aside>

    <!-- Main Panel -->
    <main class="main-panel">
      <header class="topbar">
        <button id="menuToggle" class="menu-toggle">☰</button>
        <div>Welcome, Teacher</div>
        <span class="student-id">Staff ID: TCH00321</span>
      </header>

      <section class="content">
        <h2>📘 Classwork Entry</h2>
        <p>Select a class and input student scores for classwork or homework.</p>

        <!-- Filters -->
        <div class="filter-bar">
          <div class="filter-group">
            <label for="subjectClass">Class:</label>
            <select id="subjectClass">
              <option disabled selected>Loading classes...</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="academicYear">Academic Year:</label>
            <select id="academicYear">
              <option disabled selected>Loading years...</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="monthSelect">Month:</label>
            <select id="monthSelect">
              <option disabled selected>Select month</option>
              <!-- Months dynamically filled -->
            </select>
          </div>
          <div class="filter-group">
            <label for="weekSelect">Week:</label>
            <select id="weekSelect">
              <option disabled selected>Select week</option>
              <option>Week 1</option>
              <option>Week 2</option>
              <option>Week 3</option>
              <option>Week 4</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="daySelect">Day:</label>
            <select id="daySelect">
              <option disabled selected>Select day</option>
              <option>Monday</option>
              <option>Tuesday</option>
              <option>Wednesday</option>
              <option>Thursday</option>
              <option>Friday</option>
            </select>
          </div>
        </div>

        <!-- Students Section -->
        <div id="studentsContainer" class="student-grid">
          <!-- Fetched students will populate here -->
        </div>
            <!-- 🧾 Submit All Records Button -->
<div style="margin-top: 2rem; text-align: center;">
  <button id="submitAllBtn" class="submit-all-btn">Submit All Records</button>
</div>
      </section>
    </main>

    <!-- Input Modal -->
    <div id="inputModal" class="modal hidden">
      <div class="modal-content">
        <span class="close-button" id="closeModalBtn">&times;</span>
        <h3>Enter Record for <span id="studentNameDisplay"></span></h3>
        <form id="entryForm">
          <label for="recordType">Type:</label>
          <select id="recordType" required>
            <option disabled selected>Select type</option>
            <option value="classwork">Classwork</option>
            <option value="homework">Homework</option>
          </select>

          <label for="workTitle">Title:</label>
          <input type="text" id="workTitle" placeholder="Work title" required />

          <label for="score">Score:</label>
          <input type="number" id="score" min="0" max="100" placeholder="Enter score" required />

          <button type="submit" class="submit-btn">Submit</button>
        </form>
      </div>
    </div>

  </div>

  <script src="classwork-entry.js"></script>

</body>
</html>
