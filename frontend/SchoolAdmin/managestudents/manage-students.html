<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Students - School Administrator</title>
  <link rel="stylesheet" href="../maincpdashboard.css" />
</head>
<body>
<div class="dashboard-container">
  <aside class="sidebar">
    <div class="logo">STUDILY</div>
    <nav>
      <ul>
         <li><a href="../admin-dashboard.html">Dashboard</a></li>
          <li><a href="../managestudents/manage-students.html">Manage Students</a></li>
          <li><a href="../manage-teachers/manage-teachers.html">Manage Teachers</a></li>
          <li><a href="../upload-results/upload-results.html">Upload Results</a></li>
          <li><a href="../messages/send-message.html">Send message</a></li>
          <li><a href="../academicyear/academic-year.html" >Academic Years</a></li>
          <li><a href="../fees/fees-management.html">Fees Management</a></li>
          <li class="logout"><a href="../admin-login.html">Logout</a></li>
      </ul>
    </nav>
  </aside>

  <div id="overlay" class="overlay"></div>

  <main class="main-panel">
    <header class="topbar">
      <button id="menuToggle" class="menu-toggle">☰</button>
      <div>Welcome, School Administrator</div>
    </header>

    <section class="content">
      <h2>🎓 Manage Students</h2>
      <button id="addStudentBtn" type="button" class="login-btn">+ Add Student</button>
      <div id="studentTableContainer"></div>
    </section>
  </main>
</div>

<!-- Add/Edit Student Popup -->
<div id="studentPopup" class="overlay">
  <div class="login-wrapper" style="max-width: 600px;">
    <div class="login-box">
      <h3 id="popupTitle">Add Student</h3>
      <form id="studentForm">
        <div class="input-group">
          <label for="studentName">Full Name</label>
          <input type="text" id="studentName" required />
        </div>
        <div class="input-group">
          <label for="studentId">Student ID</label>
          <input type="text" id="studentId" required />
        </div>
        <div class="input-group">
          <label for="studentEmail">Email</label>
          <input type="email" id="studentEmail" required />
        </div>
        <div class="input-group">
          <label for="studentPassword">Password</label>
          <input type="password" id="studentPassword" required />
        </div>
        <div class="input-group">
          <label for="studentClass">Class</label>
          <input type="text" id="studentClass" required />
        </div>
        <div class="input-group">
          <label for="studentYear">Academic Year</label>
          <select id="studentYear" required>
            <option disabled selected>Loading years...</option>
          </select>
        </div>
        <button type="submit" class="login-btn">Submit</button>
      </form>
    </div>
  </div>
</div>

<script src="manage-students.js"></script>
<script>
  // Sidebar Toggle
  document.getElementById("menuToggle").addEventListener("click", () => {
    document.querySelector(".sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
  });
  document.getElementById("overlay").addEventListener("click", () => {
    document.querySelector(".sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
  });

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    window.location.href = "../../LoginHomepage/LoginHomepage.html";
  });
</script>
</body>
</html>
